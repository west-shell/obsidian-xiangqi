name: Build and Pre-release

on:
  push:
    tags:
      - '[0-9]+\.[0-9]+\.[0-9]+'
      - '[0-9]+\.[0-9]+\.[0-9]+-*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: obsidian-xiangqi

      - name: Checkout xiangqi.js
        uses: actions/checkout@v4
        with:
          repository: west-shell/xiangqi.js
          path: xiangqi.js

      - name: Checkout xiangqiground
        uses: actions/checkout@v4
        with:
          repository: west-shell/xiangqiground
          path: xiangqiground

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (xiangqi.js)
        working-directory: xiangqi.js
        run: npm ci

      - name: Install dependencies (xiangqiground)
        working-directory: xiangqiground
        run: npm ci

      - name: Install dependencies
        working-directory: obsidian-xiangqi
        run: npm ci

      - name: Build
        working-directory: obsidian-xiangqi
        run: npm run build

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            obsidian-xiangqi/build/main.js
            obsidian-xiangqi/build/manifest.json
            obsidian-xiangqi/build/styles.css
