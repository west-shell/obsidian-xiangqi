name: Build and Pre-release

on:
  push:
    tags:
      - '[0-9]+\.[0-9]+\.[0-9]+'
      - '[0-9]+\.[0-9]+\.[0-9]+-*'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: obsidian-xiangqi

      - name: Checkout xiangqi.js
        uses: actions/checkout@v4
        with:
          repository: west-shell/xiangqi.js
          path: xiangqi.js

      - name: Checkout xiangqiground
        uses: actions/checkout@v4
        with:
          repository: west-shell/xiangqiground
          path: xiangqiground

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (xiangqi.js)
        working-directory: xiangqi.js
        run: npm ci

      - name: Install dependencies (xiangqiground)
        working-directory: xiangqiground
        run: npm ci

      - name: Install dependencies
        working-directory: obsidian-xiangqi
        run: npm ci

      - name: Build
        working-directory: obsidian-xiangqi
        run: npm run build

      - name: Generate build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            obsidian-xiangqi/build/main.js
            obsidian-xiangqi/build/manifest.json
            obsidian-xiangqi/build/styles.css
            obsidian-xiangqi/assets/wood.png
            obsidian-xiangqi/assets/bamboo.jpg

      - name: Copy assets to build (preserve path)
        working-directory: obsidian-xiangqi
        run: |
          mkdir -p build/assets
          cp assets/wood.png assets/bamboo.jpg build/assets/

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            obsidian-xiangqi/build/main.js
            obsidian-xiangqi/build/manifest.json
            obsidian-xiangqi/build/styles.css

      - name: Upload assets with assets/ prefix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" \
            'obsidian-xiangqi/build/assets/wood.png#assets/wood.png' \
            'obsidian-xiangqi/build/assets/bamboo.jpg#assets/bamboo.jpg' \
            --clobber
